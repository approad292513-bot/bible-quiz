<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성경퀴즈 대회</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 32px 24px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-bottom: 24px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 0.5px solid #e0e0e0;
        }

        .player-info p {
            margin: 0;
            font-size: 14px;
        }

        .player-name {
            font-weight: 600;
            color: #333;
        }

        .player-progress {
            color: #666;
            font-size: 12px;
        }

        .score-box {
            text-align: center;
            background: #f0f0ff;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .score-label {
            font-size: 10px;
            color: #666;
            margin: 0;
        }

        .score-value {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
            margin: 2px 0 0 0;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: #667eea;
            transition: width 0.3s;
        }

        .question-box {
            background: #f9f9f9;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            border: 0.5px solid #e0e0e0;
        }

        .question-text {
            font-size: 15px;
            font-weight: 500;
            line-height: 1.5;
            margin: 0 0 8px 0;
            color: #333;
        }

        .question-chapter {
            font-size: 11px;
            color: #999;
            margin: 0 0 8px 0;
        }

        .hint {
            font-size: 12px;
            font-weight: 500;
            color: #667eea;
            margin: 8px 0 0 0;
            padding: 6px 8px;
            background: #f0f0ff;
            border-radius: 4px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
        }

        input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            font-size: 14px;
            border: 0.5px solid #e0e0e0;
            border-radius: 6px;
            font-family: inherit;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
        }

        input[type="text"]:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        button {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            font-weight: 500;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        button:hover {
            background: #5568d3;
        }

        button:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none;
        }

        .info-box {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 12px;
            color: #666;
        }

        .info-box p {
            margin: 0 0 4px 0;
        }

        .info-box p:last-child {
            margin-bottom: 0;
        }

        .result-box {
            padding: 12px;
            border-radius: 6px;
            border: 0.5px solid;
            margin-bottom: 8px;
            margin-top: 12px;
        }

        .result-correct {
            background: #d4edda;
            border-color: #28a745;
        }

        .result-wrong {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .result-title {
            font-size: 14px;
            font-weight: 600;
            margin: 0 0 6px 0;
        }

        .result-correct .result-title {
            color: #155724;
        }

        .result-wrong .result-title {
            color: #721c24;
        }

        .result-label {
            font-size: 11px;
            font-weight: 600;
            margin: 0 0 2px 0;
        }

        .result-answer {
            font-size: 12px;
            margin: 0;
            padding: 4px 6px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 3px;
        }

        .result-points {
            font-size: 14px;
            font-weight: 600;
            margin: 6px 0 0 0;
        }

        .result-correct .result-label,
        .result-correct .result-points {
            color: #155724;
        }

        .result-wrong .result-label,
        .result-wrong .result-points {
            color: #721c24;
        }

        .finish-score {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .finish-score p {
            margin: 0;
        }

        .finish-score-label {
            font-size: 12px;
            margin-bottom: 8px;
        }

        .finish-score-value {
            font-size: 32px;
            font-weight: 600;
            margin: 0;
        }

        .finish-score-percent {
            font-size: 14px;
            margin: 6px 0 0 0;
        }

        .grade-message {
            text-align: center;
            font-size: 13px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 시작 화면 -->
        <div id="startScreen">
            <h1>⛪ 성경퀴즈 대회</h1>
            <p class="subtitle">2026년 더사랑의교회 소년부</p>
            
            <div class="form-group">
                <label>이름을 입력하세요</label>
                <input type="text" id="playerName" placeholder="예: 김철수">
            </div>

            <div class="info-box">
                <p>📝 문제 수: 60개 중 랜덤 10개</p>
                <p>⭐ 배점: 1문제 10점 (만점 100점)</p>
                <p>⚡ 형식: 주관식 (빈칸 채우기)</p>
            </div>

            <button onclick="startGame()">시작하기</button>
        </div>

        <!-- 게임 화면 -->
        <div id="gameScreen" class="hidden">
            <div class="progress-info">
                <div class="player-info">
                    <p class="player-name" id="gamePlayerName"></p>
                    <p class="player-progress"><span id="currentQuestion">1</span> / <span id="totalQuestions">25</span></p>
                </div>
                <div class="score-box">
                    <p class="score-label">점수</p>
                    <p class="score-value" id="currentScore">0점</p>
                </div>
            </div>

            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>

            <div class="question-box">
                <p class="question-text" id="questionText"></p>
                <p class="question-chapter" id="questionChapter"></p>
                <p class="hint" id="questionHint"></p>
            </div>

            <div class="form-group">
                <input type="text" id="answerInput" placeholder="답을 입력하세요..." onkeypress="if(event.key==='Enter' && !showingAnswer) submitAnswer()">
            </div>

            <button id="submitBtn" onclick="submitAnswer()">제출</button>
            <button id="nextBtn" class="hidden" onclick="nextQuestion()">다음 문제</button>

            <div id="resultContainer"></div>
        </div>

        <!-- 완료 화면 -->
        <div id="finishScreen" class="hidden">
            <h1>퀴즈 완료!</h1>
            
            <div class="finish-score">
                <p class="finish-score-label" id="finishPlayerName"></p>
                <p class="finish-score-value" id="finalScore">0점</p>
                <p class="finish-score-percent" id="finalPercent">0%</p>
            </div>

            <p class="grade-message" id="gradeMessage"></p>

            <button onclick="restartGame()">다시 시작하기</button>
        </div>
    </div>

    <script>
        // 60개 문제
        const allQuestions = [
            { text: "하나님 말씀이 잘 들리지 않던 시대 상황을 성경은 \"___ 여호와의 말씀이 하여 라고 ..\" 표현했습니다. 빈칸에 들어갈 말은 무엇인가요?", answer: "희귀", hint: "2글자", chapter: "사무엘상 1장" },
            { text: "어린 사무엘이 잠을 자며 살고 있던 '하나님의 집'은 어디인가요?", answer: "성막", hint: "2글자", chapter: "사무엘상 1장" },
            { text: "하나님이 사무엘을 부르시는 소리를 엘리 제사장은 몇번이 반복된 후에야 깨달았나요?", answer: "세번", hint: "2글자(한글로)", chapter: "사무엘상 1장" },
            { text: "한 나라를 세우기 위해 꼭 필요한 3가지 요소는 무엇인가요?", answer: "영토국민주권", hint: "6글자(띄어쓰기없이)", chapter: "1/1 (설교일) 창세기 1장" },
            { text: "하나님께서 6일 동안 창조를 마치시고 7일째 되던 날 아담과 하와와 함께 시간을 보내며 쉬신 것을 성경은 무엇이라고 부르나요?", answer: "안식", hint: "2글자", chapter: "1/1 (설교일) 창세기 1장" },
            { text: "하나님 나라의 주권을 위임받은 인간은 이 세상을 누구의 뜻 대로 다스려야 하나요?", answer: "하나님", hint: "3글자", chapter: "1/1 (설교일) 창세기 1장" },
            { text: "하나님 나라의 백성은 하나님과 함께하는 시간이 꼭 필요한데 주일이나 가정에서 하나님을 만나는 시간을 무엇이라고 부르나요?", answer: "예배", hint: "2글자", chapter: "1/1 (설교일) 창세기 1장" },
            { text: "눈에 안 보이는 작은 충치 균처럼 처음에는 달콤해 보이지만 하나님과 우리 사이를 갈라놓고 마음을 썩게 만드는 것을 한 글자로 무엇이라고 하나요?", answer: "죄", hint: "1글자", chapter: "1/15 (설교일) 창세기 3장" },
            { text: "에덴동산에서 하나님이 아담과 하와에게 절대 먹지 말라고 명령하신 열매는 무엇인가요?", answer: "선악과", hint: "3글자", chapter: "1/15 (설교일) 창세기 3장" },
            { text: "죄를 지어 부끄러움을 느낀 아담과 하와가 자신들을 가리기 위해 엮어 만든 나뭇잎은 무슨 나무의 잎인가요?", answer: "무화과나무", hint: "5글자", chapter: "1/15 (설교일) 창세기 3장" },
            { text: "죄의 문제를 해결하기 위해 누군가 대신 피 흘리고 죽어야 한다는 것을 보여주시기 위해 하나님이 아담과 하와를 위해 직접 무엇을 만들어 주셨나요?", answer: "가죽옷", hint: "3글자", chapter: "1/15 (설교일) 창세기 3장" },
            { text: "하나님께서 40일 동안 비를 내려 세상을 심판하실 때 사람과 동물이 살아남을 수 있었던 커다란 배의 이름은 무엇인가요?", answer: "방주", hint: "2글자", chapter: "1/22 (설교일) 창세기 6장" },
            { text: "노아가 구원을 받을 수 있었던 것은 그가 완벽해서가 아니라 '___'을 입었기 때문이라고 창세기 6장 8절은 말합니다. 이것은 무엇인가요?", answer: "은혜", hint: "2글자", chapter: "1/22 (설교일) 창세기 6장" },
            { text: "방주에서 나온 노아가 가장 먼저 한 행동은 하나님께 무엇을 드린 건가요?", answer: "제사", hint: "2글자", chapter: "1/22 (설교일) 창세기 6장" },
            { text: "하나님께서 다시는 물로 모든 생물을 심판하지 않겠다고 노아와 약속하시며 보여주신 증거는 무엇인가요?", answer: "무지개", hint: "3글자", chapter: "1/22 (설교일) 창세기 6장" },
            { text: "사람들이 하나님을 드러내지 않고 \"우리 이름을 내자\"며 하늘에 닿을 만큼 높게 쌓으려고 했던 탑은 무엇인가요?", answer: "바벨탑", hint: "3글자", chapter: "2/5 (설교일) 창세기 11장" },
            { text: "바벨탑을 쌓던 사람들은 \"___온 지면에 을 면하자\"라고 말하며 하나님의 명령을 거부했습니다. 빈칸에 들어갈 말은 무엇인가요?", answer: "흩어짐", hint: "3글자", chapter: "2/5 (설교일) 창세기 11장" },
            { text: "하나님께서 바벨탑을 쌓는 사람들의 공사를 멈추게 하시기 위해 하신 일은 그들의 '이것을' 혼잡하게 하신 것입니다. 이것은 무엇인가요?", answer: "언어", hint: "2글자", chapter: "2/5 (설교일) 창세기 11장" },
            { text: "설교에서 하나님 나라는 우리끼리만 한 곳에 모여 있는 것이 아니라 흩어져서 세워져야 한다며 바람을 타고 날아가는 어떤 꽃의 씨앗에 비유했나요?", answer: "민들레", hint: "3글자", chapter: "2/5 (설교일) 창세기 11장" },
            { text: "요즘 사람들이 긴 영상보다 숏폼 영상을 많이 보는 이유로 시간을 많이 들이지 않고 얻고자 하는 'OO적인' 보상 때문이라고 설명했습니다. 빈칸에 들어갈 말은 무엇인가요?", answer: "즉각", hint: "2글자", chapter: "2/12 (설교일) 창세기 12장" },
            { text: "하나님께서 아브라함에게 찾아와 처음으로 아버지 집 고향 땅을 떠나라고 말씀하셨을 때 아브라함의 나이는 몇 세였나요?", answer: "75", hint: "2글자(00세)", chapter: "2/12 (설교일) 창세기 12장" },
            { text: "하나님은 자식이 없어 두려워하고 막막해하는 아브라함을 밖으로 데리고 나가 '이것을' 보여주시며 자손이 많아질 것을 약속하셨습니다. 이것은 무엇인가요?", answer: "별", hint: "1글자", chapter: "2/12 (설교일) 창세기 12장" },
            { text: "아브라함 시대에 목숨을 걸고 약속을 지키겠다는 의미로 했던 방법으로 하나님께서 아브라함과 약속하실 때 여러 동물들을 어떻게 한 뒤 그 사이를 지나가셨나요?", answer: "반으로잘랐다", hint: "6글자(000잘랐다)", chapter: "2/12 (설교일) 창세기 12장" },
            { text: "신약성경 야고보서에서 하나님은 아브라함의 믿음을 보시고 그를 가르켜 \"___\"나의 이라고 부르셨습니다. 빈칸에 들어갈 한 글자는 무엇인가요?", answer: "벗", hint: "1글자", chapter: "2/19 (설교일) 창세기 22장" },
            { text: "하나님께서 아브라함에게 사랑하는 하나뿐인 아들 이삭을 데리고 가서 번제물로 바치라고 명령하신 산의 이름은 무엇인가요?", answer: "모리아", hint: "3글자", chapter: "2/19 (설교일) 창세기 22장" },
            { text: "아브라함이 이삭을 제단에 눕혔을 때 하나님의 천사가 아브라함을 멈추게 하고 대신 제사로 드려진 동물은 무엇인가요?", answer: "숫양", hint: "2글자", chapter: "2/19 (설교일) 창세기 22장" },
            { text: "무서워서 벌벌 떠는 두려움이 아니라 하나님을 너무 사랑하고 존경해서 그분의 말씀을 가장 중요하게 생각하는 마음을 두 글자로 무엇이라고 하나요?", answer: "경외", hint: "2글자", chapter: "2/19 (설교일) 창세기 22장" },
            { text: "야곱이 사냥을 마치고 돌아와 배고파하는 형 에서에게서 '장자권'을 빼앗기 위해 주었던 음식은 무엇인가요?", answer: "죽", hint: "1글자", chapter: "3/8 (설교일) 창세기 32장" },
            { text: "눈이 잘 보이지 않는 아버지 이삭을 속여 축복을 받기 위해 야곱은 털이 많은 형처럼 꾸미려고 몸에 어떤 동물의 가죽을 붙였나요?", answer: "염소가죽", hint: "4글자(00가죽)", chapter: "3/8 (설교일) 창세기 32장" },
            { text: "20년 동안 삼촌의 집에서 일한 뒤 고향으로 돌아오던 야곱은 형 에서가 자신을 만나기 위해 하인을 몇 명이나 거느리고 오고 있다는 소식을 들었나요?", answer: "400", hint: "3글자(000명)", chapter: "3/8 (설교일) 창세기 32장" },
            { text: "얍복강 나루터에 홀로 남은 야곱이 어떤 사람(하나님)과 날이 새도록 씨름을 하다가 어긋나서 절뚝거리게 된 뼈는 어디인가요?", answer: "엉덩이뼈", hint: "4글자", chapter: "3/8 (설교일) 창세기 32장" },
            { text: "성경은 노예로 팔려가고 감옥에 갇히며 롤러코스터처럼 오르락내리락했던 요셉의 인생을 가르켜 한 단어로 무엇이라고 기록했나요?", answer: "형통", hint: "2글자", chapter: "3/15 (설교일) 창세기 39장" },
            { text: "애굽에 노예로 팔려 간 요셉이 성실하게 일했던 곳은 누구의 집이었나요?", answer: "보디발", hint: "3글자", chapter: "3/15 (설교일) 창세기 39장" },
            { text: "'진짜 형통'은 내 맘대로 다 잘되는 성공이 아니라 힘들고 어려운 상황 속에서도 '___'와 꽉 잡고 함께하는 것을 말하나요?", answer: "하나님", hint: "3글자", chapter: "3/15 (설교일) 창세기 39장" },
            { text: "무서운 인생의 롤러코스터를 탈 때 우리 몸을 꽉 잡아주는 '이것'이 바로 하나님이라고 설교에서 비유했습니다. 이것은 무엇인가요?", answer: "안전바", hint: "3글자", chapter: "3/15 (설교일) 창세기 39장" },
            { text: "요셉은 자신을 노예로 팔아버린 형들을 원수로 보지 않고 어떤 대상으로 보았나요?", answer: "용서와사랑의대상", hint: "8글자", chapter: "3/22 (설교일) 창세기 50장" },
            { text: "요셉이 형들을 원망하지 않고 용서할 수 있었던 것은 하나님의 ___과 ___을 알았기 때문이에요. 빈칸에 들어갈 말은 무엇인가요?", answer: "꿈과계획", hint: "4글자(0과00)", chapter: "3/22 (설교일) 창세기 50장" },
            { text: "\"요셉은 형들에게 당신은 나를 해하려 하였으나 하나님은 그것을 ___으로 바꾸사\"라고 말했습니다. 빈칸에 들어갈 말은 무엇인가요?", answer: "선", hint: "1글자", chapter: "3/22 (설교일) 창세기 50장" },
            { text: "나에게 잘못한 원수를 용서하는 요셉과 같은 마음은 우리 스스로 품기 어렵습니다. 오직 누구만이 주실 수 있는 마음인가요?", answer: "하나님", hint: "3글자", chapter: "3/22 (설교일) 창세기 50장" },
            { text: "예수님의 부활이 진짜라는 첫 번째 증거로 예수님의 시신을 모셔두었던 이곳이 비어있었다고 했습니다. 이곳은 어디인가요?", answer: "돌무덤", hint: "3글자", chapter: "4/5 (설교일) 고린도전서 15장" },
            { text: "안식 후 첫날 이른 새벽에 예수님의 무덤에 갔다가 입구를 막아둔 무거운 돌이 옮겨진 것을 발견한 사람은 누구인가요?", answer: "막달라마리아", hint: "6글자", chapter: "4/5 (설교일) 고린도전서 15장" },
            { text: "부활하신 예수님은 베드로와 열두 제자뿐만 아니라 한꺼번에 무려 몇 명이 넘는 사람들에게 일시에 보이셨나요?", answer: "500명", hint: "3글자(000명)", chapter: "4/5 (설교일) 고린도전서 15장" },
            { text: "예수님의 부활하심을 믿는 우리는 '부활하신 예수님을 ___사람'이 되야 합니다. 빈칸에 들어갈 말은 무엇인가요?", answer: "전하는", hint: "3글자", chapter: "4/5 (설교일) 고린도전서 15장" },
            { text: "하나님께서 이스라엘 백성을 구원하기 위해 모세를 처음 부르셨을 때 모세는 미디안 광야 한구석에 사는 80세 할아버지였습니다. 이때 모세의 직업은 무엇이었나요?", answer: "목동", hint: "2글자", chapter: "4/12 (설교일) 출애굽기 3장" },
            { text: "하나님께서 애굽의 노예로 고통받는 이스라엘 백성을 구원하신 목적은 그들을 '___'이 되게 하고 하나님을 '___'하기 위함이었습니다. 빈칸에 들어갈 말은 무엇인가요?", answer: "백성섬기게", hint: "5글자(띄어쓰기없이)", chapter: "4/12 (설교일) 출애굽기 3장" },
            { text: "80세의 모세가 \"내가 누군데 이런 일을 할 수 있겠습니까?\"라고 물었을 때 하나님은 \"내가 반드시 너와 '__' 있으리라!\"라고 약속하셨습니다. 빈칸에 들어갈 말은 무엇인가요?", answer: "함께", hint: "2글자", chapter: "4/12 (설교일) 출애굽기 3장" },
            { text: "하나님께서 완벽한 조건을 갖춘 ___세의 젊은 왕자 모세가 아니라 ___늙고 평범한 세의 모세를 부르신 이유는 구원을 모세가 아니라 하나님께서 하셨다는 것을 보여주기 위함이었습니다. 빈칸에 들어갈 말은 무엇인가요?", answer: "4080", hint: "4글자", chapter: "4/12 (설교일) 출애굽기 3장" },
            { text: "이스라엘 백성들이 애굽 군대를 피해 도망칠 때 그들의 앞을 가로막고 있었던 아주 큰 바다의 이름은 무엇인가요?", answer: "홍해", hint: "2글자", chapter: "4/26 (설교일) 출애굽기 14장" },
            { text: "모세는 두려워하는 이스라엘 백성들에게 \"___가만히 서서\"라고 했습니다. 설교에서 '가만히 있으라'는 말은 무엇을 멈추라는 뜻이라고 했나요?", answer: "불평불만", hint: "4글자", chapter: "4/26 (설교일) 출애굽기 14장" },
            { text: "하나님은 두려워하며 불평하는 이스라엘 백성들에게 모세를 통해 \"앞으로 ___게 하여\"라고 명령하셨습니다. 빈칸에 들어갈 말은 무엇인가요?", answer: "나아가", hint: "3글자", chapter: "4/26 (설교일) 출애굽기 14장" },
            { text: "하나님이 이스라엘 백성들과 늘 함께 하신다는 것을 보여주기 위해 지으라고 명령하신 것은 무엇인가요?", answer: "성막", hint: "2글자", chapter: "5/10 (설교일) 출애굽기 40장" },
            { text: "수백만 명의 이스라엘 백성들이 텐트를 쳤을 때 성막은 어디에 위치해 있었나요?", answer: "가운데", hint: "3글자", chapter: "5/10 (설교일) 출애굽기 40장" },
            { text: "오늘날 하나님을 왕으로 모시는 우리 마음속 중심에 함께 계시는 분은 누구이신가요?", answer: "성령님", hint: "3글자", chapter: "5/10 (설교일) 출애굽기 40장" },
            { text: "'거룩하신 하나님을 어떻게 만날 수 있는가'에 대한 하나님의 안내서 역할을 하는 성경책의 이름은 무엇인가요?", answer: "레위기", hint: "3글자", chapter: "5/17 (설교일) 레위기 1장" },
            { text: "구약 시대 사람들은 내 마음대로가 아니라 반드시 하나님이 가르쳐 주신 이 방법을 통해서만 하나님께 나아갈 수 있었습니다. 이 방법은 무엇인가요?", answer: "제사", hint: "2글자", chapter: "5/17 (설교일) 레위기 1장" },
            { text: "오늘날 우리는 짐승의 피 없이도 예수님의 보혈을 의지해 하나님을 만날 수 있습니다. 예수님이 열어주신 이 기적 같은 만남의 시간을 두 글자로 무엇이라고 부르나요?", answer: "예배", hint: "2글자", chapter: "5/17 (설교일) 레위기 1장" },
            { text: "거룩하신 하나님이 죄인인 이스라엘 백성들과 함께하시고자 1년에 단 하루 영적인 대청소를 하는 날로 정해주신 날은 무슨 날인가요?", answer: "속죄일", hint: "3글자", chapter: "5/24 (설교일) 레위기 16장" },
            { text: "대제사장만이 1년에 딱 한 번 들어갈 수 있었으며 십계명 두 돌판이 들어있는 법궤가 놓여있는 성막의 가장 깊숙한 장소는 어디인가요?", answer: "지성소", hint: "3글자", chapter: "5/24 (설교일) 레위기 16장" },
            { text: "예수님을 통해 우리는 하나님께 나아갈 수 있습니다. 이를 보여주듯 예수님이 십자가에서 죽으실 때 지성소를 가리고 있던 성막의 '이것'이 찢어졌어요. 이것은 무엇인가요?", answer: "휘장", hint: "2글자", chapter: "5/24 (설교일) 레위기 16장" },
        ];

        let gameState = {
            playerName: '',
            selectedQuestions: [],
            currentQuestionIndex: 0,
            score: 0,
            showingAnswer: false
        };

        function normalizeAnswer(answer) {
            return answer.trim().replace(/\s+/g, '').toLowerCase().replace(/[.!?,;:()]/g, '');
        }

        function startGame() {
            const name = document.getElementById('playerName').value.trim();
            if (!name) {
                alert('이름을 입력해주세요!');
                return;
            }

            gameState.playerName = name;
            gameState.selectedQuestions = allQuestions.sort(() => Math.random() - 0.5).slice(0, 10);
            gameState.currentQuestionIndex = 0;
            gameState.score = 0;
            gameState.showingAnswer = false;

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameScreen').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            const q = gameState.selectedQuestions[gameState.currentQuestionIndex];
            const progress = gameState.currentQuestionIndex + 1;

            document.getElementById('gamePlayerName').textContent = gameState.playerName;
            document.getElementById('currentQuestion').textContent = progress;
            document.getElementById('totalQuestions').textContent = gameState.selectedQuestions.length;
            document.getElementById('currentScore').textContent = gameState.score + '점';
            document.getElementById('progressFill').style.width = (progress / gameState.selectedQuestions.length * 100) + '%';
            document.getElementById('questionText').textContent = q.text;
            document.getElementById('questionChapter').textContent = q.chapter;
            document.getElementById('questionHint').textContent = '💡 ' + q.hint;
            document.getElementById('answerInput').value = '';
            document.getElementById('answerInput').disabled = false;
            document.getElementById('answerInput').focus();
            document.getElementById('submitBtn').classList.remove('hidden');
            document.getElementById('nextBtn').classList.add('hidden');
            document.getElementById('resultContainer').innerHTML = '';
            gameState.showingAnswer = false;
        }

        function submitAnswer() {
            const userAnswer = document.getElementById('answerInput').value;
            const q = gameState.selectedQuestions[gameState.currentQuestionIndex];
            const correct = normalizeAnswer(userAnswer) === normalizeAnswer(q.answer);

            gameState.showingAnswer = true;

            if (correct) {
                gameState.score += 10;
            }

            document.getElementById('currentScore').textContent = gameState.score + '점';
            document.getElementById('answerInput').disabled = true;
            document.getElementById('submitBtn').classList.add('hidden');
            document.getElementById('nextBtn').classList.remove('hidden');

            let resultHTML = '<div class="result-box ' + (correct ? 'result-correct' : 'result-wrong') + '">';
            resultHTML += '<p class="result-title">' + (correct ? '✓ 정답입니다!' : '✗ 틀렸습니다') + '</p>';
            resultHTML += '<p class="result-label">정답:</p>';
            resultHTML += '<p class="result-answer">' + q.answer + '</p>';
            if (!correct) {
                resultHTML += '<p class="result-label">당신의 답:</p>';
                resultHTML += '<p class="result-answer">' + userAnswer + '</p>';
            }
            resultHTML += '<p class="result-points">' + (correct ? '+4점' : '0점') + '</p>';
            resultHTML += '</div>';

            document.getElementById('resultContainer').innerHTML = resultHTML;
        }

        function nextQuestion() {
            if (gameState.currentQuestionIndex < gameState.selectedQuestions.length - 1) {
                gameState.currentQuestionIndex++;
                loadQuestion();
            } else {
                finishGame();
            }
        }

        function finishGame() {
            const total = gameState.selectedQuestions.length * 10;
            const percent = Math.round(gameState.score / total * 100);

            document.getElementById('gameScreen').classList.add('hidden');
            document.getElementById('finishScreen').classList.remove('hidden');
            document.getElementById('finishPlayerName').textContent = gameState.playerName + '님';
            document.getElementById('finalScore').textContent = gameState.score + '점';
            document.getElementById('finalPercent').textContent = percent + '%';

            let message = '';
            if (percent >= 90) message = '🌟 완벽합니다!';
            else if (percent >= 80) message = '👏 매우 잘했습니다!';
            else if (percent >= 70) message = '😊 잘했습니다!';
            else if (percent >= 60) message = '💪 더 노력해봅시다!';
            else message = '📖 다시 한번 공부해봐요!';

            document.getElementById('gradeMessage').textContent = message;

            // Google Sheets에 점수 자동 저장
            fetch('https://script.google.com/macros/s/AKfycbw2JsnVS8aWwf5tI5hscql6_FGmihIKsKFgkyGB4evkPV8JzvUEYMnn6xbqVzh36zEd/exec', {
                method: 'POST',
                body: JSON.stringify({
                    name: gameState.playerName,
                    score: gameState.score,
                    totalQuestions: gameState.selectedQuestions.length,
                    timestamp: new Date().toLocaleString('ko-KR')
                })
            }).catch(err => console.log('점수 저장됨'));
        }

        function restartGame() {
            document.getElementById('finishScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('playerName').value = '';
            document.getElementById('playerName').focus();
        }
    </script>
</body>
</html>
