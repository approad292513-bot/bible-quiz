<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성경퀴즈 대회</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/react.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/react-dom.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
const { useState } = React;

const BibleQuizApp = () => {
  const defaultQuestions = [
    { id: 1, text: "하나님 말씀이 잘 들리지 않던 시대 상황을 성경은 \"___ 여호와의 말씀이 하여 라고 ..\" 표현했습니다. 빈칸에 들어갈 말은 무엇인가요?", answer: "희귀", hint: "2글자", chapter: "사무엘상 1장" },
    { id: 2, text: "어린 사무엘이 잠을 자며 살고 있던 '하나님의 집'은 어디인가요?", answer: "성막", hint: "2글자", chapter: "사무엘상 1장" },
    { id: 3, text: "하나님이 사무엘을 부르시는 소리를 엘리 제사장은 몇번이 반복된 후에야 깨달았나요?", answer: "세번", hint: "2글자", chapter: "사무엘상 1장" },
    { id: 4, text: "한 나라를 세우기 위해 꼭 필요한 3가지 요소는 무엇인가요?", answer: "영토국민주권", hint: "6글자", chapter: "1/1 (설교일) 창세기 1장" },
    { id: 5, text: "하나님께서 6일 동안 창조를 마치시고 7일째 되던 날 아담과 하와와 함께 시간을 보내며 쉬신 것을 성경은 무엇이라고 부르나요?", answer: "안식", hint: "2글자", chapter: "1/1 (설교일) 창세기 1장" },
    { id: 6, text: "하나님 나라의 주권을 위임받은 인간은 이 세상을 누구의 뜻 대로 다스려야 하나요?", answer: "하나님", hint: "3글자", chapter: "1/1 (설교일) 창세기 1장" },
    { id: 7, text: "하나님 나라의 백성은 하나님과 함께하는 시간이 꼭 필요한데 주일이나 가정에서 하나님을 만나는 시간을 무엇이라고 부르나요?", answer: "예배", hint: "2글자", chapter: "1/1 (설교일) 창세기 1장" },
    { id: 8, text: "눈에 안 보이는 작은 충치 균처럼 처음에는 달콤해 보이지만 하나님과 우리 사이를 갈라놓고 마음을 썩게 만드는 것을 한 글자로 무엇이라고 하나요?", answer: "죄", hint: "1글자", chapter: "1/15 (설교일) 창세기 3장" },
    { id: 9, text: "에덴동산에서 하나님이 아담과 하와에게 절대 먹지 말라고 명령하신 열매는 무엇인가요?", answer: "선악과", hint: "3글자", chapter: "1/15 (설교일) 창세기 3장" },
    { id: 10, text: "죄를 지어 부끄러움을 느낀 아담과 하와가 자신들을 가리기 위해 엮어 만든 나뭇잎은 무슨 나무의 잎인가요?", answer: "무화과나무", hint: "5글자", chapter: "1/15 (설교일) 창세기 3장" },
    { id: 11, text: "죄의 문제를 해결하기 위해 누군가 대신 피 흘리고 죽어야 한다는 것을 보여주시기 위해 하나님이 아담과 하와를 위해 직접 무엇을 만들어 주셨나요?", answer: "가죽옷", hint: "3글자", chapter: "1/15 (설교일) 창세기 3장" },
    { id: 12, text: "하나님께서 40일 동안 비를 내려 세상을 심판하실 때 사람과 동물이 살아남을 수 있었던 커다란 배의 이름은 무엇인가요?", answer: "방주", hint: "2글자", chapter: "1/22 (설교일) 창세기 6장" },
    { id: 13, text: "노아가 구원을 받을 수 있었던 것은 그가 완벽해서가 아니라 '___'을 입었기 때문이라고 창세기 6장 8절은 말합니다. 이것은 무엇인가요?", answer: "은혜", hint: "2글자", chapter: "1/22 (설교일) 창세기 6장" },
    { id: 14, text: "방주에서 나온 노아가 가장 먼저 한 행동은 하나님께 무엇을 드린 건가요?", answer: "제사", hint: "2글자", chapter: "1/22 (설교일) 창세기 6장" },
    { id: 15, text: "하나님께서 다시는 물로 모든 생물을 심판하지 않겠다고 노아와 약속하시며 보여주신 증거는 무엇인가요?", answer: "무지개", hint: "3글자", chapter: "1/22 (설교일) 창세기 6장" },
    { id: 16, text: "사람들이 하나님을 드러내지 않고 \"우리 이름을 내자\"며 하늘에 닿을 만큼 높게 쌓으려고 했던 탑은 무엇인가요?", answer: "바벨탑", hint: "3글자", chapter: "2/5 (설교일) 창세기 11장" },
    { id: 17, text: "바벨탑을 쌓던 사람들은 \"___온 지면에 을 면하자\"라고 말하며 하나님의 명령을 거부했습니다. 빈칸에 들어갈 말은 무엇인가요?", answer: "흩어짐", hint: "3글자", chapter: "2/5 (설교일) 창세기 11장" },
    { id: 18, text: "하나님께서 바벨탑을 쌓는 사람들의 공사를 멈추게 하시기 위해 하신 일은 그들의 '이것을' 혼잡하게 하신 것입니다. 이것은 무엇인가요?", answer: "언어", hint: "2글자", chapter: "2/5 (설교일) 창세기 11장" },
    { id: 19, text: "설교에서 하나님 나라는 우리끼리만 한 곳에 모여 있는 것이 아니라 흩어져서 세워져야 한다며 바람을 타고 날아가는 어떤 꽃의 씨앗에 비유했나요?", answer: "민들레", hint: "3글자", chapter: "2/5 (설교일) 창세기 11장" },
  ];

  const [gameState, setGameState] = useState('start');
  const [playerName, setPlayerName] = useState('');
  const [quizzes, setQuizzes] = useState(defaultQuestions);
  const [selectedQuestions, setSelectedQuestions] = useState([]);
  const [currentQuestionIndex, setCurrentQuestionIndex] = useState(0);
  const [userAnswer, setUserAnswer] = useState('');
  const [score, setScore] = useState(0);
  const [showAnswer, setShowAnswer] = useState(false);
  const [isCorrect, setIsCorrect] = useState(null);

  const normalizeAnswer = (answer) => {
    return answer.trim().replace(/\s+/g, '').toLowerCase();
  };

  const startGame = () => {
    if (!playerName.trim()) {
      alert('이름을 입력해주세요!');
      return;
    }
    const shuffled = [...quizzes].sort(() => Math.random() - 0.5).slice(0, 5);
    setSelectedQuestions(shuffled);
    setGameState('playing');
    setCurrentQuestionIndex(0);
    setScore(0);
    setUserAnswer('');
    setShowAnswer(false);
  };

  const submitAnswer = () => {
    if (!userAnswer.trim()) {
      alert('답을 입력해주세요!');
      return;
    }
    const correct = normalizeAnswer(userAnswer) === normalizeAnswer(selectedQuestions[currentQuestionIndex].answer);
    setIsCorrect(correct);
    setShowAnswer(true);
    if (correct) {
      setScore(score + 4);
    }
  };

  const nextQuestion = () => {
    if (currentQuestionIndex < selectedQuestions.length - 1) {
      setCurrentQuestionIndex(currentQuestionIndex + 1);
      setUserAnswer('');
      setShowAnswer(false);
      setIsCorrect(null);
    } else {
      setGameState('finished');
    }
  };

  const restartGame = () => {
    setGameState('start');
    setPlayerName('');
    setUserAnswer('');
    setScore(0);
    setCurrentQuestionIndex(0);
    setShowAnswer(false);
    setIsCorrect(null);
  };

  const styles = {
    container: {
      minHeight: '100vh',
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      padding: '20px',
      background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
    },
    card: {
      background: 'white',
      borderRadius: '16px',
      boxShadow: '0 10px 40px rgba(0, 0, 0, 0.1)',
      padding: '40px',
      maxWidth: '600px',
      width: '100%',
    },
    title: {
      fontSize: '36px',
      fontWeight: '700',
      margin: '0 0 10px',
      textAlign: 'center',
      color: '#333',
    },
    subtitle: {
      fontSize: '14px',
      color: '#666',
      textAlign: 'center',
      margin: '0 0 30px',
    },
    input: {
      width: '100%',
      padding: '12px 16px',
      fontSize: '16px',
      border: '2px solid #e0e0e0',
      borderRadius: '8px',
      boxSizing: 'border-box',
    },
    button: {
      width: '100%',
      padding: '14px',
      fontSize: '16px',
      fontWeight: '600',
      background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
      color: 'white',
      border: 'none',
      borderRadius: '8px',
      cursor: 'pointer',
      marginTop: '12px',
    },
    questionBox: {
      background: '#f9f9f9',
      padding: '24px',
      borderRadius: '8px',
      marginBottom: '24px',
      border: '2px solid #e0e0e0',
    },
    questionText: {
      fontSize: '18px',
      fontWeight: '500',
      lineHeight: '1.6',
      margin: '0 0 12px',
      color: '#333',
    },
    chapter: {
      fontSize: '12px',
      color: '#999',
      margin: '0 0 8px',
    },
    hint: {
      fontSize: '14px',
      fontWeight: '600',
      color: '#667eea',
      margin: '12px 0 0',
      padding: '8px 12px',
      background: '#f0f0ff',
      borderRadius: '6px',
    },
    resultBox: {
      marginTop: '16px',
    },
    resultContent: {
      padding: '20px',
      borderRadius: '8px',
      border: '2px solid',
      marginBottom: '16px',
    },
    correctAnswer: {
      fontSize: '16px',
      fontWeight: '600',
      margin: '12px 0 4px',
      padding: '8px 12px',
      background: 'rgba(255, 255, 255, 0.5)',
      borderRadius: '4px',
    },
  };

  // 시작 화면
  if (gameState === 'start') {
    return (
      <div style={styles.container}>
        <div style={styles.card}>
          <h1 style={styles.title}>⛪ 성경퀴즈 대회</h1>
          <p style={styles.subtitle}>2026년 더사랑의교회 소년부</p>

          <div style={{ marginBottom: '30px' }}>
            <label style={{ display: 'block', fontSize: '14px', fontWeight: '600', marginBottom: '8px' }}>이름을 입력하세요</label>
            <input
              type="text"
              value={playerName}
              onChange={(e) => setPlayerName(e.target.value)}
              placeholder="예: 김철수"
              style={styles.input}
              onKeyPress={(e) => e.key === 'Enter' && startGame()}
            />
          </div>

          <div style={{ background: '#f5f5f5', padding: '20px', borderRadius: '8px', marginBottom: '20px' }}>
            <p>📝 테스트 버전: 5문제 (실제 배포시 25문제)</p>
            <p>⭐ 배점: 1문제 4점 (만점 20점)</p>
            <p>⚡ 형식: 주관식 (빈칸 채우기)</p>
          </div>

          <button onClick={startGame} style={styles.button}>
            시작하기
          </button>
        </div>
      </div>
    );
  }

  // 문제 화면
  if (gameState === 'playing') {
    const currentQuestion = selectedQuestions[currentQuestionIndex];
    const progress = currentQuestionIndex + 1;

    return (
      <div style={styles.container}>
        <div style={styles.card}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '20px', paddingBottom: '16px', borderBottom: '2px solid #e0e0e0' }}>
            <div>
              <p style={{ fontSize: '18px', fontWeight: '600', margin: '0 0 4px' }}>{playerName}</p>
              <p style={{ fontSize: '14px', color: '#666', margin: 0 }}>{progress} / {selectedQuestions.length}</p>
            </div>
            <div style={{ textAlign: 'center', background: '#f0f0ff', padding: '12px 20px', borderRadius: '8px' }}>
              <p style={{ fontSize: '12px', color: '#666', margin: 0 }}>점수</p>
              <p style={{ fontSize: '24px', fontWeight: '700', color: '#667eea', margin: '4px 0 0' }}>{score}점</p>
            </div>
          </div>

          <div style={{ width: '100%', height: '8px', background: '#e0e0e0', borderRadius: '4px', overflow: 'hidden', marginBottom: '30px' }}>
            <div style={{ height: '100%', background: 'linear-gradient(90deg, #667eea 0%, #764ba2 100%)', width: `${(progress / selectedQuestions.length) * 100}%`, transition: 'width 0.3s' }}></div>
          </div>

          <div style={styles.questionBox}>
            <p style={styles.questionText}>{currentQuestion.text}</p>
            <p style={styles.chapter}>{currentQuestion.chapter}</p>
            <p style={styles.hint}>💡 힌트: {currentQuestion.hint}</p>
          </div>

          <div style={{ marginBottom: '16px' }}>
            <input
              type="text"
              value={userAnswer}
              onChange={(e) => setUserAnswer(e.target.value)}
              placeholder="답을 입력하세요..."
              style={{...styles.input, borderColor: showAnswer ? '#ccc' : '#667eea'}}
              disabled={showAnswer}
              onKeyPress={(e) => e.key === 'Enter' && !showAnswer && submitAnswer()}
            />
          </div>

          {!showAnswer && (
            <button onClick={submitAnswer} style={styles.button}>제출하기</button>
          )}

          {showAnswer && (
            <div style={styles.resultBox}>
              <div style={{...styles.resultContent, backgroundColor: isCorrect ? '#d4edda' : '#f8d7da', borderColor: isCorrect ? '#28a745' : '#dc3545'}}>
                <p style={{ fontSize: '18px', fontWeight: '500', marginTop: 0, color: isCorrect ? '#155724' : '#721c24' }}>
                  {isCorrect ? '✓ 정답입니다!' : '✗ 틀렸습니다'}
                </p>
                <p style={{ fontSize: '12px', fontWeight: '600', margin: '12px 0 4px', color: isCorrect ? '#155724' : '#721c24' }}>정답:</p>
                <p style={styles.correctAnswer}>{currentQuestion.answer}</p>
                {!isCorrect && (
                  <>
                    <p style={{ fontSize: '12px', fontWeight: '600', margin: '12px 0 4px', color: '#721c24' }}>당신의 답:</p>
                    <p style={styles.correctAnswer}>{userAnswer}</p>
                  </>
                )}
                <p style={{ fontSize: '16px', fontWeight: '500', marginTop: '12px', color: isCorrect ? '#155724' : '#721c24' }}>
                  {isCorrect ? '+4점' : '0점'}
                </p>
              </div>

              <button onClick={nextQuestion} style={styles.button}>
                {progress < selectedQuestions.length ? '다음 문제' : '완료하기'}
              </button>
            </div>
          )}
        </div>
      </div>
    );
  }

  // 완료 화면
  if (gameState === 'finished') {
    const percentage = Math.round((score / (selectedQuestions.length * 4)) * 100);

    return (
      <div style={styles.container}>
        <div style={styles.card}>
          <h2 style={styles.title}>퀴즈 완료!</h2>

          <div style={{ background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', color: 'white', padding: '30px', borderRadius: '12px', textAlign: 'center', marginBottom: '30px' }}>
            <p style={{ fontSize: '16px', margin: 0 }}>{playerName}님의 최종 점수</p>
            <p style={{ fontSize: '48px', fontWeight: '700', margin: '10px 0' }}>{score}점</p>
            <p style={{ fontSize: '20px', margin: '10px 0 0' }}>{percentage}%</p>
          </div>

          <div style={{ textAlign: 'center', marginBottom: '30px' }}>
            {percentage >= 80 && <p style={{ fontSize: '18px', fontWeight: '600', color: '#667eea', margin: 0 }}>👏 매우 잘했습니다!</p>}
            {percentage >= 60 && percentage < 80 && <p style={{ fontSize: '18px', fontWeight: '600', color: '#667eea', margin: 0 }}>😊 잘했습니다!</p>}
            {percentage < 60 && <p style={{ fontSize: '18px', fontWeight: '600', color: '#667eea', margin: 0 }}>📖 다시 한번 도전해봐요!</p>}
          </div>

          <button onClick={restartGame} style={styles.button}>다시 시작하기</button>
        </div>
      </div>
    );
  }
};

ReactDOM.render(<BibleQuizApp />, document.getElementById('root'));
    </script>
</body>
</html>
